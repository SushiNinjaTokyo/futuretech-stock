name: AI Arena JP War Room

on:
  workflow_dispatch:
    inputs:
      session_type:
        description: "Council session type"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - open_council
          - midday_council
          - close_council
          - night_strategy_lab
          - weekly_arena_review
      commit_outputs:
        description: "Commit generated War Room outputs"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
  schedule:
    - cron: "30 0 * * 1-5"   # 09:30 JST weekdays: Open +30m Council
    - cron: "0 3 * * 1-5"    # 12:00 JST weekdays: Midday Council
    - cron: "30 6 * * 1-5"   # 15:30 JST weekdays: Post-Close Council
    - cron: "30 11 * * 1-5"  # 20:30 JST weekdays: Night Strategy Lab
    - cron: "0 1 * * 6"      # 10:00 JST Saturdays: Weekly Arena Review

permissions:
  contents: write

concurrency:
  group: ai-arena-jp-war-room-${{ github.event.inputs.session_type || 'auto' }}
  cancel-in-progress: false

jobs:
  war-room:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OUT_DIR: site
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_ARENA_WAR_ROOM_MODEL: ${{ vars.AI_ARENA_WAR_ROOM_MODEL || 'gpt-4o' }}
      AI_ARENA_WAR_ROOM_SESSION_TYPE: ${{ github.event.inputs.session_type || 'auto' }}
      AI_ARENA_WAR_ROOM_MESSAGES: ${{ vars.AI_ARENA_WAR_ROOM_MESSAGES }}
      AI_ARENA_WAR_ROOM_MIN_DELAY_SECONDS: "180"
      AI_ARENA_WAR_ROOM_MAX_DELAY_SECONDS: "300"
      AI_ARENA_WAR_ROOM_TEMPERATURE: ${{ vars.AI_ARENA_WAR_ROOM_TEMPERATURE || '0.82' }}
      AI_ARENA_WAR_ROOM_HISTORY_DAYS: "14"
      AI_ARENA_WAR_ROOM_OPENAI_MIN_INTERVAL_SECONDS: ${{ vars.AI_ARENA_WAR_ROOM_OPENAI_MIN_INTERVAL_SECONDS || '30' }}
      AI_ARENA_WAR_ROOM_OPENAI_MAX_RETRIES: ${{ vars.AI_ARENA_WAR_ROOM_OPENAI_MAX_RETRIES || '8' }}
      AI_ARENA_WAR_ROOM_OPENAI_429_BASE_SLEEP_SECONDS: ${{ vars.AI_ARENA_WAR_ROOM_OPENAI_429_BASE_SLEEP_SECONDS || '75' }}
      AI_ARENA_WAR_ROOM_MAX_GPT_TOPIC_CALLS: ${{ vars.AI_ARENA_WAR_ROOM_MAX_GPT_TOPIC_CALLS || '99' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-render.txt

      - name: Pull latest main
        run: |
          set -euo pipefail
          git pull --ff-only origin main

      - name: Build and render War Room
        run: |
          set -euo pipefail
          python -m compileall scripts/build_ai_arena_war_room_jp.py scripts/render_ai_arena_war_room_jp.py
          python scripts/build_ai_arena_war_room_jp.py
          python scripts/render_ai_arena_war_room_jp.py
          test -s site/data/japan/ai-arena/war-room/latest.json
          test -s site/japan/ai-arena/log/index.html
          test -s site/assets/ai_arena_war_room_jp.css
          test -s site/assets/ai_arena_war_room_jp.js

      - name: Commit War Room outputs
        if: ${{ github.event_name == 'schedule' || github.event.inputs.commit_outputs != 'false' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            site/data/japan/ai-arena/war-room \
            site/japan/ai-arena/log \
            site/assets/ai_arena_war_room_jp.css \
            site/assets/ai_arena_war_room_jp.js
          if git diff --cached --quiet; then
            echo "No War Room changes to commit."
          else
            git commit -m "Update AI Arena Live Council"
            git push
          fi
