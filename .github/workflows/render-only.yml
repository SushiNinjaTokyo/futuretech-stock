name: render-only

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Render target date (YYYY-MM-DD). Empty = latest available date"
        required: false
        default: ""

concurrency:
  group: render-only
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve report date
        id: resolve_date
        shell: bash
        env:
          INPUT_REPORT_DATE: ${{ github.event.inputs.report_date }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_REPORT_DATE}" ]; then
            REPORT_DATE="${INPUT_REPORT_DATE}"
          else
            REPORT_DATE=$(python -c "from pathlib import Path; data_dir=Path('site/data'); dates=sorted([p.name for p in data_dir.iterdir() if p.is_dir() and len(p.name)==10], reverse=True); print(dates[0] if dates else '')")
          fi

          if [ -z "${REPORT_DATE}" ]; then
            echo "No site/data/YYYY-MM-DD directories found"
            exit 1
          fi

          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Verify source data exists
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/top10.json"

      - name: Render HTML
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/render.py

      - name: Verify rendered outputs
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/daily/${REPORT_DATE}.html"
          test -f "site/assets/daily.css"

      - name: Commit changes
        id: commitstep
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add "templates/daily.html.j2" "templates/daily.css" "site/daily/${REPORT_DATE}.html" "site/assets/daily.css"

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "render: refresh daily page for ${REPORT_DATE}"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commitstep.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
