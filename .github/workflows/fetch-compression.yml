name: fetch-compression

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Target date (YYYY-MM-DD). Empty = ET market date"
        required: false
        default: ""
      force_rebuild:
        description: "Rebuild even if compression.json already exists"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: fetch-compression
  cancel-in-progress: true

jobs:
  fetch-compression:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve report date
        id: resolve_date
        shell: bash
        env:
          INPUT_REPORT_DATE: ${{ github.event.inputs.report_date }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_REPORT_DATE:-}" ]; then
            REPORT_DATE="${INPUT_REPORT_DATE}"
          else
            REPORT_DATE="$(python scripts/et_market_date.py)"
          fi

          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Check remote existing output
        id: skipcheck
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          set -euo pipefail

          TARGET="site/data/${REPORT_DATE}/compression.json"

          if [ "${FORCE_REBUILD:-false}" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "force_rebuild=true, skip existing check bypassed"
            exit 0
          fi

          if git cat-file -e "origin/main:${TARGET}" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Compression output already exists on origin/main: ${TARGET}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Compression output does not exist yet: ${TARGET}"
          fi

      - name: Fetch Compression
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/fetch_compression.py

      - name: Verify outputs
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/compression.json"
          test -f "site/data/compression/latest.json"

      - name: Commit changes
        if: steps.skipcheck.outputs.exists != 'true'
        id: commitstep
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add \
            "site/data/${REPORT_DATE}/compression.json" \
            "site/data/compression/latest.json"

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "compression: update for ${REPORT_DATE}"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commitstep.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
