name: weekly-analysis

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "full = rebuild weekly backtest/simulation. render_only = render from existing JSON."
        required: false
        default: "full"
        type: choice
        options:
          - full
          - render_only

      end_date:
        description: "Analysis end date YYYY-MM-DD. Blank = latest ET market date."
        required: false
        default: ""

      weeks:
        description: "Number of weekly backtest snapshots"
        required: false
        default: "32"

      run_weekly_backtest:
        description: "Build /weekly-backtest/"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      run_weekly_simulation:
        description: "Build /weekly-simulation/"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  schedule:
    # Tuesday 00:18 UTC = Tuesday 09:18 JST.
    # Runs after Monday US open data is available for prior weekly signals.
    - cron: "18 00 * * 2"

permissions:
  contents: write

concurrency:
  group: weekly-analysis
  cancel-in-progress: false

jobs:
  weekly-analysis:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OUT_DIR: site
      UNIVERSE_CSV: data/universe.csv
      WEEKLY_CANDIDATES_CSV: data/weekly_candidates.csv
      DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
      WEEKLY_ENABLE_FUNDAMENTALS: ${{ vars.WEEKLY_ENABLE_FUNDAMENTALS || 'false' }}

      WEEKLY_BACKTEST_BENCHMARK: ${{ vars.WEEKLY_BACKTEST_BENCHMARK || 'SPY' }}
      WEEKLY_SIM_BENCHMARK: ${{ vars.WEEKLY_SIM_BENCHMARK || 'SPY' }}

      WEEKLY_RUN_MODE: ${{ github.event.inputs.run_mode || 'full' }}
      WEEKLY_INPUT_END_DATE: ${{ github.event.inputs.end_date || '' }}
      WEEKLY_BACKTEST_WEEKS: ${{ github.event.inputs.weeks || '32' }}

      RUN_WEEKLY_BACKTEST: ${{ github.event.inputs.run_weekly_backtest || 'true' }}
      RUN_WEEKLY_SIMULATION: ${{ github.event.inputs.run_weekly_simulation || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync latest main before build
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve weekly analysis end date
        id: set_date
        run: |
          set -euo pipefail

          if [ -n "${WEEKLY_INPUT_END_DATE:-}" ]; then
            END_DATE="${WEEKLY_INPUT_END_DATE}"
          else
            END_DATE="$(python scripts/et_market_date.py)"
          fi

          echo "END_DATE=${END_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved WEEKLY_BACKTEST_END_DATE=${END_DATE}"

      - name: Build weekly backtest
        if: ${{ env.RUN_WEEKLY_BACKTEST == 'true' }}
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.END_DATE }}
          WEEKLY_BACKTEST_END_DATE: ${{ steps.set_date.outputs.END_DATE }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${WEEKLY_RUN_MODE}" = "render_only" ]; then
            if [ -f scripts/render_weekly_backtest.py ]; then
              python scripts/render_weekly_backtest.py
            elif [ -f site/data/weekly/backtest/latest.json ] && [ -f scripts/rebuild_weekly_backtest.py ]; then
              echo "render_weekly_backtest.py not found. rebuild_weekly_backtest.py may fetch data, so skipping in render_only."
            else
              echo "No weekly backtest render script or latest JSON found."
            fi
            exit 0
          fi

          python scripts/rebuild_weekly_backtest.py

      - name: Build weekly simulation
        if: ${{ env.RUN_WEEKLY_SIMULATION == 'true' }}
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.END_DATE }}
          WEEKLY_BACKTEST_END_DATE: ${{ steps.set_date.outputs.END_DATE }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${WEEKLY_RUN_MODE}" = "render_only" ]; then
            if [ -f scripts/render_weekly_simulation.py ]; then
              test -f site/data/weekly/simulation/latest.json
              python scripts/render_weekly_simulation.py
            else
              echo "render_only requested, but scripts/render_weekly_simulation.py not found."
            fi
            exit 0
          fi

          if [ -f scripts/rebuild_weekly_simulation.py ]; then
            python scripts/rebuild_weekly_simulation.py
          elif [ -f scripts/render_weekly_simulation.py ]; then
            echo "scripts/rebuild_weekly_simulation.py not found. Rendering existing simulation JSON only."
            test -f site/data/weekly/simulation/latest.json
            python scripts/render_weekly_simulation.py
          else
            echo "No weekly simulation script found. Skipping."
          fi

      - name: Render index page
        run: |
          set -euo pipefail

          if [ -f scripts/render_index.py ]; then
            python scripts/render_index.py
          else
            echo "scripts/render_index.py not found. Skipping index render."
          fi

      - name: Verify outputs
        run: |
          set -euo pipefail

          if [ "${RUN_WEEKLY_BACKTEST}" = "true" ]; then
            if [ "${WEEKLY_RUN_MODE}" != "render_only" ]; then
              test -f "site/data/weekly/backtest/latest.json"
            fi
            test -f "site/weekly-backtest/index.html"
          fi

          if [ "${RUN_WEEKLY_SIMULATION}" = "true" ]; then
            if [ -f "site/data/weekly/simulation/latest.json" ]; then
              test -f "site/weekly-simulation/index.html"
            else
              echo "No weekly simulation latest.json found; simulation may have been skipped."
            fi
          fi

          test -f "site/index.html"

      - name: Commit weekly analysis outputs
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          for path in \
            site/data/weekly/backtest \
            site/data/weekly/simulation \
            site/data/index \
            site/weekly-backtest/index.html \
            site/weekly-simulation/index.html \
            site/index.html \
            site/assets/weekly_backtest.css \
            site/assets/weekly_simulation.css \
            site/assets/index.css
          do
            if [ -e "$path" ]; then
              git add "$path"
            else
              echo "Skip missing path: $path"
            fi
          done

          if git diff --cached --quiet; then
            echo "No weekly analysis changes to commit."
            exit 0
          fi

          git commit -m "chore: update weekly analysis"

          git pull --rebase origin main
          git push origin main
