name: daily-report

on:
  schedule:
    - cron: '18 00 * * *'  # UTC 00:18 / JST 09:18
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync latest main before build
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set ET market date
        id: set_date
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DATE="$(python scripts/et_market_date.py)"
          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Fetch Compression Release
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/fetch_compression.py

      - name: Verify Compression output
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/compression.json"
          test -f "site/data/compression/latest.json"

      - name: Google Trends breakout
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          TRENDS_GEO: "US"
          TRENDS_TIMEFRAME: "today 3-m"
          TRENDS_BATCH: "3"
          TRENDS_SLEEP: "4.0"
          TRENDS_JITTER: "1.5"
          TRENDS_COOLDOWN_BASE: "45"
          TRENDS_COOLDOWN_MAX: "180"
          TRENDS_BATCH_RETRIES: "4"
        run: |
          set -euo pipefail
          python scripts/fetch_trends.py

      - name: Verify Trends output
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/trends.json"
          test -f "site/data/trends/latest.json"

      - name: Fetch News
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          NEWS_SLEEP_SEC: "1.0"
          NEWS_LOOKBACK_DAYS: "10"
          NEWS_MAX_PER_SYMBOL: "50"
          NEWS_WEIGHT_TODAY: "0.55"
          NEWS_WEIGHT_VS_YDAY: "0.20"
          NEWS_WEIGHT_VS_3DAY: "0.25"
          NEWS_BASELINE_FLOOR: "0.5"
          NEWS_STRICT_FILTER: "true"
        run: |
          set -euo pipefail
          python scripts/fetch_news.py

      - name: Verify News output
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/news.json"
          test -f "site/data/news/latest.json"

      - name: Verify component inputs
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/news.json"
          test -f "site/data/${REPORT_DATE}/trends.json"
          test -f "site/data/${REPORT_DATE}/compression.json"

      - name: Generate Top10 JSON
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          MOCK_MODE: ${{ vars.MOCK_MODE || 'false' }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
          WEIGHT_VOL_ANOM: ${{ vars.WEIGHT_VOL_ANOM || '0.35' }}
          WEIGHT_COMPRESSION: ${{ vars.WEIGHT_COMPRESSION || '0.15' }}
          WEIGHT_TRENDS: ${{ vars.WEIGHT_TRENDS || '0.25' }}
          WEIGHT_NEWS: ${{ vars.WEIGHT_NEWS || '0.25' }}
        run: |
          set -euo pipefail
          python scripts/fetch_daily.py

      - name: Verify Top10 outputs
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/top10.json"
          test -f "site/data/top10/latest.json"
          test -d "site/charts/${REPORT_DATE}"
          find "site/charts/${REPORT_DATE}" -maxdepth 1 -name '*.png' | grep -q .

      - name: Track signal outcomes
        shell: bash
        env:
          OUT_DIR: site
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          SIGNAL_MIN_TOP3_SCORE: ${{ vars.SIGNAL_MIN_TOP3_SCORE || '750' }}
          SIGNAL_MIN_VOLUME_SCORE: ${{ vars.SIGNAL_MIN_VOLUME_SCORE || '0.55' }}
          SIGNAL_MIN_VOLUME_COMBO_SCORE: ${{ vars.SIGNAL_MIN_VOLUME_COMBO_SCORE || '700' }}
          SIGNAL_MIN_ANY_RANK_SCORE: ${{ vars.SIGNAL_MIN_ANY_RANK_SCORE || '800' }}
          SIGNAL_REPORT_LEGACY_MIN_SCORE: ${{ vars.SIGNAL_REPORT_LEGACY_MIN_SCORE || '750' }}
        run: |
          set -euo pipefail
          python scripts/track_signal_outcomes.py

      - name: Verify signal outcome outputs
        shell: bash
        run: |
          set -euo pipefail
          test -f "site/data/signals/registry.json"
          test -f "site/data/signals/outcomes_latest.json"
          test -f "site/data/signals/summary_latest.json"

          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("site/data/signals/summary_latest.json").read_text(encoding="utf-8"))
          outcomes = json.loads(Path("site/data/signals/outcomes_latest.json").read_text(encoding="utf-8"))

          if "tracking_policy" not in summary:
              raise SystemExit("summary_latest.tracking_policy missing")

          if "total_signals" not in summary:
              raise SystemExit("summary_latest.total_signals missing")

          if not isinstance(outcomes.get("items"), list):
              raise SystemExit("outcomes_latest.items is not a list")

          print("total_signals:", summary.get("total_signals"))
          print("raw_total_signals_in_registry:", summary.get("raw_total_signals_in_registry"))
          print("hidden_legacy_signals:", summary.get("hidden_legacy_signals"))
          print("outcomes items:", len(outcomes.get("items", [])))
          PY

      - name: Render daily page
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/render.py

      - name: Render top page
        shell: bash
        env:
          OUT_DIR: site
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/render_index.py

      - name: Render backtest page
        shell: bash
        env:
          OUT_DIR: site
        run: |
          set -euo pipefail
          python scripts/render_backtest.py

      - name: Verify rendered outputs
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          test -f "site/daily/${REPORT_DATE}.html"
          test -f "site/assets/daily.css"

          test -f "site/index.html"
          test -f "site/assets/index.css"
          test -f "site/data/index/market_pulse_latest.json"

          test -f "site/backtest/index.html"
          test -f "site/assets/backtest.css"

          grep -q "Daily Event Signal Lab" "site/backtest/index.html"

      - name: Commit changes
        id: commitstep
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add \
            "site/data/${REPORT_DATE}/compression.json" \
            "site/data/compression/latest.json" \
            "site/data/${REPORT_DATE}/news.json" \
            "site/data/news/latest.json" \
            "site/data/${REPORT_DATE}/trends.json" \
            "site/data/trends/latest.json" \
            "site/data/${REPORT_DATE}/top10.json" \
            "site/data/top10/latest.json" \
            "site/charts/${REPORT_DATE}" \
            "site/data/signals/registry.json" \
            "site/data/signals/outcomes_latest.json" \
            "site/data/signals/summary_latest.json" \
            "site/daily/${REPORT_DATE}.html" \
            "site/assets/daily.css" \
            "site/index.html" \
            "site/assets/index.css" \
            "site/data/index/market_pulse_latest.json" \
            "site/backtest/index.html" \
            "site/assets/backtest.css"

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: publish daily report"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commitstep.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
