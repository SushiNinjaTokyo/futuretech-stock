name: daily-report

on:
  schedule:
    - cron: '10 22 * * *'  # 18:10 ET / 07:10 JST
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: true   # ← 競合防止（重要）

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ★ shallow clone禁止（rebase安定化）
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ★ 先に最新化（コンフリクト防止）
      - name: Sync latest main
        run: |
          git pull --rebase origin main

      # ET市場日付
      - name: Set ET market date
        id: set_date
        run: |
          set -euo pipefail
          REPORT_DATE="$(python scripts/et_market_date.py)"
          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      # ---- データ生成 ----

      - name: Build DII (dark activity)
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DII_SOURCE: finra_api
          DII_LOOKBACK_WEEKS: "12"
          DII_RECENT_WEEKS: "4"
        run: python scripts/fetch_dii.py

      - name: Google Trends breakout
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          TRENDS_GEO: "US"
          TRENDS_TIMEFRAME: "today 3-m"
          TRENDS_BATCH: "3"
          TRENDS_SLEEP: "4.0"
          TRENDS_JITTER: "1.5"
          TRENDS_COOLDOWN_BASE: "45"
          TRENDS_COOLDOWN_MAX: "180"
          TRENDS_BATCH_RETRIES: "4"
        run: python scripts/fetch_trends.py

      - name: Fetch News
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          NEWS_LOOKBACK_DAYS: "7"
          NEWS_MAX_PER_SYMBOL: "20"
          NEWS_SLEEP_SEC: "1.0"
        run: python scripts/fetch_news.py

      - name: Generate Top10 JSON
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          MOCK_MODE: ${{ vars.MOCK_MODE || 'false' }}
          BUDGET_JPY_MAX: ${{ vars.BUDGET_JPY_MAX || '10000' }}
          MANUAL_DAILY_COST_JPY: ${{ vars.MANUAL_DAILY_COST_JPY || '0' }}
          TIINGO_MONTHLY_JPY: ${{ vars.TIINGO_MONTHLY_JPY || '1600' }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
          WEIGHT_VOL_ANOM: ${{ vars.WEIGHT_VOL_ANOM || '0.25' }}
          WEIGHT_DII: ${{ vars.WEIGHT_DII || '0.25' }}
          WEIGHT_TRENDS: ${{ vars.WEIGHT_TRENDS || '0.30' }}
          WEIGHT_NEWS: ${{ vars.WEIGHT_NEWS || '0.20' }}
        run: python scripts/fetch_daily.py

      - name: Render HTML
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: python scripts/render.py

      # ★ 成果物確認
      - name: Verify outputs
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          echo "REPORT_DATE=$REPORT_DATE"
          test -f "site/daily/${REPORT_DATE}.html"

      # ★ commit & push（完全版）
      - name: Commit & Push
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add -A
          git commit -m "chore: publish daily report" || echo "no changes"

          # push競合耐性
          git push || (git pull --rebase origin main && git push)
