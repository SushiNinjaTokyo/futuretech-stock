name: daily-report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OUT_DIR: site
      UNIVERSE_CSV: data/universe.csv
      DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
      DAILY_V2_SLEEP_SECONDS: "0.8"
      DAILY_V2_BACKTEST_SLEEP_SECONDS: "0.6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync latest main before build
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set ET market date
        id: set_date
        run: |
          set -euo pipefail
          REPORT_DATE="$(python scripts/et_market_date.py)"
          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Fetch Compression Release
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/fetch_compression.py

      - name: Google Trends breakout
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          TRENDS_GEO: "US"
          TRENDS_TIMEFRAME: "today 3-m"
          TRENDS_BATCH: "3"
          TRENDS_SLEEP: "4.0"
          TRENDS_JITTER: "1.5"
          TRENDS_COOLDOWN_BASE: "45"
          TRENDS_COOLDOWN_MAX: "180"
          TRENDS_BATCH_RETRIES: "4"
        run: |
          set -euo pipefail
          python scripts/fetch_trends.py

      - name: Fetch News
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          NEWS_SLEEP_SEC: "1.0"
          NEWS_LOOKBACK_DAYS: "10"
          NEWS_MAX_PER_SYMBOL: "50"
          NEWS_WEIGHT_TODAY: "0.55"
          NEWS_WEIGHT_VS_YDAY: "0.20"
          NEWS_WEIGHT_VS_3DAY: "0.25"
          NEWS_BASELINE_FLOOR: "0.5"
          NEWS_STRICT_FILTER: "true"
        run: |
          set -euo pipefail
          python scripts/fetch_news.py

      - name: Generate Daily Signals
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/build_daily_v2.py

      - name: Sync latest daily v2 and render daily
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/sync_daily_v2_latest.py
          python scripts/render_daily_v2.py

      - name: Rebuild Daily Event Backtest
        env:
          START_DATE: ${{ vars.DAILY_V2_BACKTEST_START_DATE || '2026-04-01' }}
          END_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/rebuild_signal_outcomes_v2.py --start-date "${START_DATE}" --end-date "${END_DATE}"
          python scripts/render_backtest.py

      - name: Render daily simulation if available
        run: |
          set -euo pipefail

          if [ -f "scripts/rebuild_daily_simulation.py" ]; then
            python scripts/rebuild_daily_simulation.py
          else
            echo "Skip rebuild_daily_simulation.py: script not found"
          fi

          if [ -f "scripts/render_daily_simulation.py" ]; then
            python scripts/render_daily_simulation.py
          else
            echo "Skip render_daily_simulation.py: script not found"
          fi

      - name: Render index page
        run: |
          set -euo pipefail
          python scripts/render_index.py

      - name: Verify outputs
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          test -f "site/data/daily-v2/${REPORT_DATE}/top10.json"
          test -f "site/data/daily-v2/latest.json"
          test -f "site/data/daily-v2/manifest.json"

          test -f "site/daily/index.html"
          test -f "site/index.html"

          test -f "site/data/signals-v2/outcomes_latest.json"
          test -f "site/data/signals-v2/summary_latest.json"
          test -f "site/backtest/index.html"

          grep -q "Daily Event Signal Lab" site/backtest/index.html
          grep -q 'href="/daily/"' site/index.html

          if grep -q 'href="/daily-simulation/"' site/index.html; then
            test -f "site/daily-simulation/index.html"
            echo "Daily simulation link found and page exists."
          else
            echo "Daily simulation link not found on index; skip daily simulation page verification."
          fi

      - name: Commit outputs
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          # Add generated paths only.
          # Use git add -A so deletions are also staged.
          paths=(
            "site/data/daily-v2"
            "site/data/signals-v2"
            "site/data/compression"
            "site/data/trends"
            "site/data/news"
            "site/data/index"
            "site/data/daily/simulation"
            "site/daily/index.html"
            "site/backtest/index.html"
            "site/daily-simulation/index.html"
            "site/index.html"
            "site/assets/daily.css"
            "site/assets/backtest.css"
            "site/assets/daily_simulation.css"
            "site/assets/daily-simulation.css"
            "site/assets/index.css"
          )

          for path in "${paths[@]}"; do
            if [ -e "$path" ] || [ -n "$(git ls-files -- "$path")" ]; then
              git add -A -- "$path"
            else
              echo "Skip missing and untracked path: $path"
            fi
          done

          echo "Git status after staging generated outputs:"
          git status --short

          if git diff --cached --quiet; then
            echo "No daily changes to commit."
            exit 0
          fi

          git commit -m "chore: update daily v2 signals and backtest"

          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is still dirty after commit. Add the following generated paths to the Commit outputs path list, or stop generating them."
            git status --short
            exit 1
          fi

          git pull --rebase origin main
          git push origin main
