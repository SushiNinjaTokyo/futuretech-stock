name: daily-report

on:
  schedule:
    - cron: '10 22 * * *'  # 18:10 ET / 07:10 JST
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync latest main before build
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set ET market date
        id: set_date
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DATE="$(python scripts/et_market_date.py)"
          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Skip if daily output already exists on remote
        id: skipcheck
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          TARGET="site/data/${REPORT_DATE}/top10.json"
          if git cat-file -e "origin/main:${TARGET}" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Daily output already exists on origin/main: ${TARGET}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Daily output does not exist yet: ${TARGET}"
          fi

      - name: Fetch Form4
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          SEC_USER_AGENT: "futuretech-stock/1.0 (contact: your-email@example.com)"
          FORM4_MAX_FILINGS: "8"
          FORM4_MAX_AGE_DAYS: "95"
          SEC_SLEEP: "0.7"
        run: |
          set -euo pipefail
          python scripts/fetch_form4.py

      - name: Verify Form4 output
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/form4.json"
          test -f "site/data/form4/latest.json"

      - name: Build DII
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DII_SOURCE: form4
          DII_LOOKBACK_WEEKS: "12"
          DII_RECENT_WEEKS: "4"
        run: |
          set -euo pipefail
          python scripts/fetch_dii.py

      - name: Verify DII output
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/dii.json"
          test -f "site/data/dii/latest.json"

      - name: Google Trends breakout
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          TRENDS_GEO: "US"
          TRENDS_TIMEFRAME: "today 3-m"
          TRENDS_BATCH: "3"
          TRENDS_SLEEP: "4.0"
          TRENDS_JITTER: "1.5"
          TRENDS_COOLDOWN_BASE: "45"
          TRENDS_COOLDOWN_MAX: "180"
          TRENDS_BATCH_RETRIES: "4"
        run: |
          set -euo pipefail
          python scripts/fetch_trends.py

      - name: Fetch News
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          NEWS_LOOKBACK_DAYS: "7"
          NEWS_MAX_PER_SYMBOL: "20"
          NEWS_SLEEP_SEC: "1.0"
        run: |
          set -euo pipefail
          python scripts/fetch_news.py

      - name: Generate Top10 JSON
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          MOCK_MODE: ${{ vars.MOCK_MODE || 'false' }}
          BUDGET_JPY_MAX: ${{ vars.BUDGET_JPY_MAX || '10000' }}
          MANUAL_DAILY_COST_JPY: ${{ vars.MANUAL_DAILY_COST_JPY || '0' }}
          TIINGO_MONTHLY_JPY: ${{ vars.TIINGO_MONTHLY_JPY || '1600' }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
          WEIGHT_VOL_ANOM: ${{ vars.WEIGHT_VOL_ANOM || '0.25' }}
          WEIGHT_DII: ${{ vars.WEIGHT_DII || '0.25' }}
          WEIGHT_TRENDS: ${{ vars.WEIGHT_TRENDS || '0.30' }}
          WEIGHT_NEWS: ${{ vars.WEIGHT_NEWS || '0.20' }}
        run: |
          set -euo pipefail
          python scripts/fetch_daily.py

      - name: Render HTML
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/render.py

      - name: Verify outputs
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/top10.json"
          test -f "site/daily/${REPORT_DATE}.html"

      - name: Commit changes
        if: steps.skipcheck.outputs.exists != 'true'
        id: commitstep
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: publish daily report"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.skipcheck.outputs.exists != 'true' && steps.commitstep.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
