name: daily-report

on:
  schedule:
    - cron: '30 23 * * *'  # 19:30 ET / 08:30 JST
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild even if top10.json already exists"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: daily-report
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync latest main before build
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set ET market date
        id: set_date
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DATE="$(python scripts/et_market_date.py)"
          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Skip if daily output already exists on remote
        id: skipcheck
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          set -euo pipefail

          TARGET="site/data/${REPORT_DATE}/top10.json"

          if [ "${FORCE_REBUILD:-false}" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "force_rebuild=true, skip existing check bypassed"
            exit 0
          fi

          if git cat-file -e "origin/main:${TARGET}" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Daily output already exists on origin/main: ${TARGET}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Daily output does not exist yet: ${TARGET}"
          fi

      - name: Fetch Compression Release
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/fetch_compression.py

      - name: Verify Compression output
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/compression.json"
          test -f "site/data/compression/latest.json"

      - name: Google Trends breakout
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          TRENDS_GEO: "US"
          TRENDS_TIMEFRAME: "today 3-m"
          TRENDS_BATCH: "3"
          TRENDS_SLEEP: "4.0"
          TRENDS_JITTER: "1.5"
          TRENDS_COOLDOWN_BASE: "45"
          TRENDS_COOLDOWN_MAX: "180"
          TRENDS_BATCH_RETRIES: "4"
        run: |
          set -euo pipefail
          python scripts/fetch_trends.py

      - name: Fetch News
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          NEWS_SLEEP_SEC: "1.0"
          NEWS_LOOKBACK_DAYS: "10"
          NEWS_MAX_PER_SYMBOL: "50"
          NEWS_WEIGHT_TODAY: "0.55"
          NEWS_WEIGHT_VS_YDAY: "0.20"
          NEWS_WEIGHT_VS_3DAY: "0.25"
          NEWS_BASELINE_FLOOR: "0.5"
          NEWS_STRICT_FILTER: "true"
        run: |
          set -euo pipefail
          python scripts/fetch_news.py

      - name: Verify component inputs
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/news.json"
          test -f "site/data/${REPORT_DATE}/trends.json"
          test -f "site/data/${REPORT_DATE}/compression.json"

      - name: Generate Top10 JSON
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
          MOCK_MODE: ${{ vars.MOCK_MODE || 'false' }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
          WEIGHT_VOL_ANOM: ${{ vars.WEIGHT_VOL_ANOM || '0.35' }}
          WEIGHT_COMPRESSION: ${{ vars.WEIGHT_COMPRESSION || '0.15' }}
          WEIGHT_TRENDS: ${{ vars.WEIGHT_TRENDS || '0.25' }}
          WEIGHT_NEWS: ${{ vars.WEIGHT_NEWS || '0.25' }}
        run: |
          set -euo pipefail
          python scripts/fetch_daily.py

      - name: Render HTML
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/render.py

      - name: Verify outputs
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/top10.json"
          test -f "site/data/top10/latest.json"
          test -f "site/daily/${REPORT_DATE}.html"
          test -f "site/assets/daily.css"
          test -d "site/charts/${REPORT_DATE}"
          find "site/charts/${REPORT_DATE}" -maxdepth 1 -name '*.png' | grep -q .

      - name: Commit changes
        if: steps.skipcheck.outputs.exists != 'true'
        id: commitstep
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add \
            "site/data/${REPORT_DATE}/compression.json" \
            "site/data/compression/latest.json" \
            "site/data/${REPORT_DATE}/news.json" \
            "site/data/news/latest.json" \
            "site/data/${REPORT_DATE}/trends.json" \
            "site/data/trends/latest.json" \
            "site/data/${REPORT_DATE}/top10.json" \
            "site/data/top10/latest.json" \
            "site/charts/${REPORT_DATE}" \
            "site/daily/${REPORT_DATE}.html" \
            "site/assets/daily.css" \
            "templates/daily.html.j2" \
            "templates/daily.css"

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: publish daily report"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.skipcheck.outputs.exists != 'true' && steps.commitstep.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
