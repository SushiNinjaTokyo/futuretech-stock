name: fetch-form4

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Target date (YYYY-MM-DD). Empty = ET market date"
        required: false
        default: ""

concurrency:
  group: fetch-form4
  cancel-in-progress: true

jobs:
  fetch-form4:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve report date
        id: resolve_date
        shell: bash
        env:
          INPUT_REPORT_DATE: ${{ github.event.inputs.report_date }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_REPORT_DATE:-}" ]; then
            REPORT_DATE="${INPUT_REPORT_DATE}"
          else
            REPORT_DATE="$(python scripts/et_market_date.py)"
          fi

          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Fetch DII from Form4
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
          SEC_USER_AGENT: "futuretech-stock/1.0 (contact: your-email@example.com)"
          FORM4_MAX_FILINGS: "12"
          FORM4_MAX_AGE_DAYS: "120"
          SEC_SLEEP: "0.7"
          DII_LOOKBACK_DAYS: "30"
          DII_LONG_LOOKBACK_DAYS: "90"
          DII_WEIGHT_UNIQUE_BUYERS: "0.40"
          DII_WEIGHT_BUY_EVENTS: "0.30"
          DII_WEIGHT_CLUSTER: "0.20"
          DII_WEIGHT_OFFICER: "0.10"
        run: |
          set -euo pipefail
          python scripts/fetch_form4.py

      - name: Verify outputs
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/dii.json"
          test -f "site/data/dii/latest.json"

      - name: Commit changes
        id: commitstep
        shell: bash
        env:
          REPORT_DATE: ${{ steps.resolve_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add \
            "site/data/${REPORT_DATE}/dii.json" \
            "site/data/dii/latest.json" \
            "site/cache/cik_map.json" \
            "site/cache/sec_company_tickers.json"

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "dii: update for ${REPORT_DATE}"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commitstep.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
