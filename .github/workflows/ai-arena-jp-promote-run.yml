name: AI Arena JP promote run

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Season year"
        required: true
        default: "2026"
      run_id:
        description: "Existing run_id to promote"
        required: true
      commit_outputs:
        description: "Commit regenerated display JSON"
        required: true
        default: "true"

permissions:
  contents: write

concurrency:
  group: ai-arena-jp-canonical-db
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OUT_DIR: site
  PRICE_DUCKDB_PATH: data/cache/neon_tokyo_jp.duckdb
  CANONICAL_DUCKDB_RELEASE_TAG: ai-arena-duckdb-latest
  CANONICAL_DUCKDB_ASSET: neon_tokyo_jp_latest.duckdb.zst
  CANONICAL_DUCKDB_MANIFEST_ASSET: neon_tokyo_jp_latest_manifest.json

jobs:
  promote:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-render.txt
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Pull latest main
        run: |
          set -euo pipefail
          git pull --ff-only origin main

      - name: Download canonical DuckDB from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p data/cache

          if ! gh release view "${CANONICAL_DUCKDB_RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Canonical DuckDB release not found: ${CANONICAL_DUCKDB_RELEASE_TAG}"
            echo "::error::Run AI Arena JP season rebuild first."
            exit 1
          fi

          gh release download "${CANONICAL_DUCKDB_RELEASE_TAG}" \
            --pattern "${CANONICAL_DUCKDB_ASSET}" \
            --dir data/cache \
            --clobber

          gh release download "${CANONICAL_DUCKDB_RELEASE_TAG}" \
            --pattern "${CANONICAL_DUCKDB_MANIFEST_ASSET}" \
            --dir data/cache \
            --clobber || true

          test -f "data/cache/${CANONICAL_DUCKDB_ASSET}"

          zstd -d -f "data/cache/${CANONICAL_DUCKDB_ASSET}" -o "${PRICE_DUCKDB_PATH}"

          test -f "${PRICE_DUCKDB_PATH}"
          ls -lh "${PRICE_DUCKDB_PATH}"

      - name: Show DB before promote
        run: |
          set -euo pipefail
          python scripts/show_duckdb_build_metadata.py \
            --db-path "${PRICE_DUCKDB_PATH}" \
            --fail-if-missing

      - name: Compile scripts
        run: |
          set -euo pipefail
          python -m compileall \
            scripts/promote_ai_arena_run_jp.py \
            scripts/render_all.py \
            scripts/render_ai_arena_summary_jp.py \
            scripts/render_ai_arena_ranking_jp.py \
            scripts/render_ai_arena_positions_jp.py \
            scripts/render_index.py \
            scripts/stamp_duckdb_build_metadata.py \
            scripts/show_duckdb_build_metadata.py \
            scripts/lib

      - name: Promote run and render pages
        env:
          ARENA_YEAR: ${{ inputs.year }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          test -f "${PRICE_DUCKDB_PATH}"

          python scripts/promote_ai_arena_run_jp.py
          python scripts/render_all.py

          test -s site/data/japan/ai-arena/summary/latest.json
          test -s site/data/japan/ai-arena/ranking/latest.json
          test -s site/data/japan/ai-arena/positions/latest.json
          test -s site/data/japan/ai-arena/hero/latest.json
          test -s site/index.html
          test -s site/japan/ai-arena/summary/index.html
          test -s site/japan/ai-arena/ranking/index.html
          test -s site/japan/ai-arena/positions/index.html

      - name: Stamp canonical DuckDB metadata
        run: |
          set -euo pipefail
          test -f "${PRICE_DUCKDB_PATH}"

          python scripts/stamp_duckdb_build_metadata.py \
            --db-path "${PRICE_DUCKDB_PATH}" \
            --source-workflow "${GITHUB_WORKFLOW}" \
            --source-run-id "${GITHUB_RUN_ID}" \
            --source-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --source-sha "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --release-tag "${CANONICAL_DUCKDB_RELEASE_TAG}" \
            --asset-name "${CANONICAL_DUCKDB_ASSET}" \
            --manifest-path "data/cache/${CANONICAL_DUCKDB_MANIFEST_ASSET}"

      - name: Show DB after promote
        run: |
          set -euo pipefail
          python scripts/show_duckdb_build_metadata.py \
            --db-path "${PRICE_DUCKDB_PATH}" \
            --fail-if-missing

      - name: Validate promoted outputs
        env:
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail

          test -f "${PRICE_DUCKDB_PATH}"
          test -s site/data/japan/ai-arena/summary/latest.json
          test -s site/data/japan/ai-arena/ranking/latest.json
          test -s site/data/japan/ai-arena/positions/latest.json
          test -s site/data/japan/ai-arena/hero/latest.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import duckdb

          expected_run_id = os.environ["RUN_ID"]

          summary = json.loads(Path("site/data/japan/ai-arena/summary/latest.json").read_text(encoding="utf-8"))
          ranking = json.loads(Path("site/data/japan/ai-arena/ranking/latest.json").read_text(encoding="utf-8"))
          positions = json.loads(Path("site/data/japan/ai-arena/positions/latest.json").read_text(encoding="utf-8"))
          hero = json.loads(Path("site/data/japan/ai-arena/hero/latest.json").read_text(encoding="utf-8"))

          for payload_name, payload in [
              ("summary", summary),
              ("ranking", ranking),
              ("positions", positions),
              ("hero", hero),
          ]:
              rid = payload.get("run_id")
              assert rid == expected_run_id, f"{payload_name} run_id mismatch: {rid} != {expected_run_id}"

          assert len(hero.get("agents", [])) == 7, len(hero.get("agents", []))

          con = duckdb.connect("data/cache/neon_tokyo_jp.duckdb", read_only=True)
          tables = {r[0] for r in con.execute("SHOW TABLES").fetchall()}

          assert "arena_display_runs" in tables
          assert "duckdb_build_metadata" in tables

          exists = con.execute(
              "SELECT COUNT(*) FROM arena_simulation_runs WHERE run_id = ?",
              [expected_run_id],
          ).fetchone()[0]
          assert exists == 1, f"arena_simulation_runs missing run_id={expected_run_id}"

          display_rows = con.execute(
              "SELECT COUNT(*) FROM arena_display_runs WHERE run_id = ?",
              [expected_run_id],
          ).fetchone()[0]
          assert display_rows >= 1, f"arena_display_runs missing run_id={expected_run_id}"

          print("promoted_run_id=", expected_run_id)
          PY

      - name: Publish canonical DuckDB Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -f "${PRICE_DUCKDB_PATH}"
          test -f "data/cache/${CANONICAL_DUCKDB_MANIFEST_ASSET}"

          zstd -T0 -19 -f "${PRICE_DUCKDB_PATH}" -o "data/cache/${CANONICAL_DUCKDB_ASSET}"

          test -f "data/cache/${CANONICAL_DUCKDB_ASSET}"
          ls -lh "data/cache/${CANONICAL_DUCKDB_ASSET}"
          ls -lh "data/cache/${CANONICAL_DUCKDB_MANIFEST_ASSET}"

          gh release upload "${CANONICAL_DUCKDB_RELEASE_TAG}" \
            "data/cache/${CANONICAL_DUCKDB_ASSET}" \
            "data/cache/${CANONICAL_DUCKDB_MANIFEST_ASSET}" \
            --clobber

      - name: Commit outputs
        if: ${{ inputs.commit_outputs == 'true' }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add -A \
            site/data/japan/ai-arena \
            site/index.html \
            site/japan/ai-arena \
            site/assets

          if git diff --cached --quiet; then
            echo "No promoted outputs to commit."
            exit 0
          fi

          git commit -m "Promote AI Arena JP run"

          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push rejected. Fetching origin/main and retrying ($i/3)..."
            git fetch origin main

            if ! git rebase origin/main; then
              echo "Rebase failed. Aborting to avoid overwriting generated files."
              git rebase --abort || true
              exit 1
            fi

            sleep 5
          done

          echo "Push failed after retries."
          exit 1
