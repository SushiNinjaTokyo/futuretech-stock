name: rebuild-daily-simulation

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "full = rebuild simulation data and render. render_only = render from existing JSON."
        required: false
        default: "full"
        type: choice
        options:
          - full
          - render_only
      start_date:
        description: "Start date YYYY-MM-DD. Blank = oldest daily-v2 date."
        required: false
        default: ""
      end_date:
        description: "End date YYYY-MM-DD. Blank = newest daily-v2 date."
        required: false
        default: ""
      initial_capital:
        description: "Initial capital for the compounding portfolio"
        required: false
        default: "10000"
      fetch_sleep_seconds:
        description: "Sleep seconds between yfinance ticker fetches"
        required: false
        default: "0.4"

permissions:
  contents: write

concurrency:
  group: rebuild-daily-simulation
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OUT_DIR: site
      DAILY_SIM_RUN_MODE: ${{ github.event.inputs.run_mode || 'full' }}
      DAILY_SIM_START_DATE: ${{ github.event.inputs.start_date || '' }}
      DAILY_SIM_END_DATE: ${{ github.event.inputs.end_date || '' }}
      DAILY_SIM_INITIAL_CAPITAL: ${{ github.event.inputs.initial_capital || '10000' }}
      DAILY_SIM_FETCH_SLEEP_SECONDS: ${{ github.event.inputs.fetch_sleep_seconds || '0.4' }}
      DAILY_SIM_BENCHMARK: QQQ
      DAILY_SIM_SECONDARY_BENCHMARK: SPY

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pandas yfinance jinja2

      - name: Rebuild daily simulation data
        if: ${{ env.DAILY_SIM_RUN_MODE == 'full' }}
        run: |
          set -euo pipefail
          python scripts/rebuild_daily_simulation.py

      - name: Render daily simulation page
        run: |
          set -euo pipefail
          test -f site/data/daily/simulation/latest.json
          python scripts/render_daily_simulation.py

      - name: Commit daily simulation outputs
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add \
            site/data/daily/simulation \
            site/daily-simulation/index.html \
            site/assets/daily_simulation.css

          if git diff --cached --quiet; then
            echo "No daily simulation changes to commit."
            exit 0
          fi

          git commit -m "chore: rebuild daily simulation"
          git pull --rebase origin main
          git push origin main
