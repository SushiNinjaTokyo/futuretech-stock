name: delete-legacy-daily-v1-date-data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DELETE to remove legacy site/data/YYYY-MM-DD folders"
        required: true
        default: ""

permissions:
  contents: write

concurrency:
  group: delete-legacy-daily-v1-date-data
  cancel-in-progress: false

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate confirmation
        run: |
          set -euo pipefail

          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "Confirmation failed. Type DELETE to proceed."
            exit 1
          fi

      - name: Sync latest main
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Show targets
        run: |
          set -euo pipefail

          echo "Legacy date folders to delete:"
          find site/data -maxdepth 1 -type d \
            -regextype posix-extended \
            -regex '.*/[0-9]{4}-[0-9]{2}-[0-9]{2}' \
            -print | sort || true

      - name: Delete legacy date folders
        run: |
          set -euo pipefail

          mapfile -t TARGETS < <(
            find site/data -maxdepth 1 -type d \
              -regextype posix-extended \
              -regex '.*/[0-9]{4}-[0-9]{2}-[0-9]{2}' \
              -print | sort
          )

          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "No legacy date folders found."
            exit 0
          fi

          git rm -r "${TARGETS[@]}"

      - name: Commit deletion
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No deletion changes to commit."
            exit 0
          fi

          git commit -m "chore: remove legacy daily v1 date data"
          git pull --rebase origin main
          git push origin main
