name: rebuild-weekly-backtest

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: "Number of Saturday snapshots to rebuild"
        required: false
        default: "4"
      end_date:
        description: "Optional end date YYYY-MM-DD. Uses latest Saturday on/before this date."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  rebuild-weekly-backtest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OUT_DIR: site
      UNIVERSE_CSV: data/universe.csv
      WEEKLY_CANDIDATES_CSV: data/weekly_candidates.csv
      WEEKLY_ENABLE_FUNDAMENTALS: ${{ vars.WEEKLY_ENABLE_FUNDAMENTALS || 'false' }}
      WEEKLY_BACKTEST_WEEKS: ${{ github.event.inputs.weeks || '4' }}
      WEEKLY_BACKTEST_END_DATE: ${{ github.event.inputs.end_date || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pandas yfinance jinja2

      - name: Rebuild weekly backtest data
        run: |
          set -euo pipefail
          python scripts/rebuild_weekly_backtest.py

      - name: Render weekly backtest page
        run: |
          set -euo pipefail
          python scripts/render_weekly_backtest.py

      - name: Commit weekly backtest outputs
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add \
            site/data/weekly/backtest/latest.json \
            site/data/weekly/backtest/*.json \
            site/weekly-backtest/index.html \
            site/assets/weekly_backtest.css

          if git diff --cached --quiet; then
            echo "No weekly backtest changes to commit."
            exit 0
          fi

          git commit -m "chore: rebuild weekly backtest"
          git push
