name: fetch-news

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Target date (YYYY-MM-DD). Empty = ET market date"
        required: false
        default: ""
      force_rebuild:
        description: "Rebuild even if news.json already exists"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "5 22 * * *"

concurrency:
  group: fetch-news
  cancel-in-progress: true

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync latest main before build
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve report date
        id: set_date
        shell: bash
        env:
          INPUT_REPORT_DATE: ${{ github.event.inputs.report_date }}
          MARKET_CUTOFF_HOUR_ET: "20"
        run: |
          set -euo pipefail

          if [ -n "${INPUT_REPORT_DATE:-}" ]; then
            REPORT_DATE="${INPUT_REPORT_DATE}"
          else
            REPORT_DATE="$(python scripts/et_market_date.py)"
          fi

          if [ -z "${REPORT_DATE}" ]; then
            echo "REPORT_DATE could not be resolved"
            exit 1
          fi

          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Check remote existing output
        id: skipcheck
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          set -euo pipefail

          TARGET="site/data/${REPORT_DATE}/news.json"

          if [ "${FORCE_REBUILD:-false}" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "force_rebuild=true, skip existing check bypassed"
            exit 0
          fi

          if git cat-file -e "origin/main:${TARGET}" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "News output already exists on origin/main: ${TARGET}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "News output does not exist yet: ${TARGET}"
          fi

      - name: Fetch News
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          NEWS_SLEEP_SEC: "1.0"
          NEWS_LOOKBACK_DAYS: "14"
          NEWS_MAX_PER_SYMBOL: "50"
          NEWS_BASELINE_DAYS: "7"
          NEWS_BASELINE_FLOOR: "0.5"
          NEWS_SPIKE_WEIGHT: "0.75"
          NEWS_TODAY_WEIGHT: "0.25"
        run: |
          set -euo pipefail
          python scripts/fetch_news.py

      - name: Verify outputs
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/${REPORT_DATE}/news.json"
          test -f "site/data/news/latest.json"

      - name: Quick inspect generated payload
        if: steps.skipcheck.outputs.exists != 'true'
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python -c "from pathlib import Path; import json, os; report_date=os.environ['REPORT_DATE']; p=Path(f'site/data/{report_date}/news.json'); j=json.loads(p.read_text(encoding='utf-8')); items=j.get('items', []); print(f'items={len(items)}'); print('sample_keys=', sorted(items[0].keys()) if items else [])"

      - name: Commit changes
        if: steps.skipcheck.outputs.exists != 'true'
        id: commitstep
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add \
            "site/data/${REPORT_DATE}/news.json" \
            "site/data/news/latest.json"

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "news: update for ${REPORT_DATE}"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.skipcheck.outputs.exists != 'true' && steps.commitstep.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
