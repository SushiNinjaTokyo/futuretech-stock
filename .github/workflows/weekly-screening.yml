name: weekly-screening

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "full = rebuild weekly screening. render_only = render from existing JSON."
        required: false
        default: "full"
        type: choice
        options:
          - full
          - render_only

      report_date:
        description: "Weekly report date YYYY-MM-DD. Blank = latest ET market date."
        required: false
        default: ""

  schedule:
    # Saturday 00:18 UTC = Saturday 09:18 JST.
    # Builds weekly candidates from completed US Friday market data.
    - cron: "18 00 * * 6"

permissions:
  contents: write

concurrency:
  group: weekly-screening
  cancel-in-progress: false

jobs:
  weekly-screening:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OUT_DIR: site
      UNIVERSE_CSV: data/universe.csv
      WEEKLY_CANDIDATES_CSV: data/weekly_candidates.csv
      DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'yfinance' }}
      WEEKLY_ENABLE_FUNDAMENTALS: ${{ vars.WEEKLY_ENABLE_FUNDAMENTALS || 'false' }}

      WEEKLY_RUN_MODE: ${{ github.event.inputs.run_mode || 'full' }}
      WEEKLY_INPUT_REPORT_DATE: ${{ github.event.inputs.report_date || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync latest main before build
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve weekly report date
        id: set_date
        run: |
          set -euo pipefail

          if [ -n "${WEEKLY_INPUT_REPORT_DATE:-}" ]; then
            REPORT_DATE="${WEEKLY_INPUT_REPORT_DATE}"
          else
            REPORT_DATE="$(python scripts/et_market_date.py)"
          fi

          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved weekly REPORT_DATE=${REPORT_DATE}"

      - name: Build weekly screening
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${WEEKLY_RUN_MODE}" = "render_only" ]; then
            if [ -f scripts/render_weekly.py ]; then
              python scripts/render_weekly.py
            else
              echo "render_only requested, but scripts/render_weekly.py not found."
              exit 1
            fi
            exit 0
          fi

          python scripts/build_weekly_screening.py

          if [ -f scripts/render_weekly.py ]; then
            python scripts/render_weekly.py
          fi

      - name: Render index page
        run: |
          set -euo pipefail

          if [ -f scripts/render_index.py ]; then
            python scripts/render_index.py
          else
            echo "scripts/render_index.py not found. Skipping index render."
          fi

      - name: Verify outputs
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          test -f "site/weekly/index.html"
          test -f "site/index.html"

          if [ -f "site/data/weekly/latest.json" ]; then
            echo "weekly latest.json exists."
          elif [ -f "site/data/weekly/${REPORT_DATE}.json" ]; then
            echo "weekly dated json exists."
          else
            echo "Missing weekly JSON output."
            exit 1
          fi

      - name: Commit weekly screening outputs
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          for path in \
            site/data/weekly \
            site/data/index \
            site/weekly/index.html \
            site/index.html \
            site/assets/weekly.css \
            site/assets/index.css
          do
            if [ -e "$path" ]; then
              git add "$path"
            else
              echo "Skip missing path: $path"
            fi
          done

          if git diff --cached --quiet; then
            echo "No weekly screening changes to commit."
            exit 0
          fi

          git commit -m "chore: update weekly screening"

          git pull --rebase origin main
          git push origin main
