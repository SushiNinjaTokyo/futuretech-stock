name: weekly-screening

on:
  schedule:
    - cron: '30 23 * * 5'  # UTC Fri 23:30 / JST Sat 08:30
  workflow_dispatch:

concurrency:
  group: weekly-screening
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync latest main before build
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas yfinance jinja2 pandas_market_calendars
          fi

      - name: Set ET market date
        id: set_date
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DATE="$(python scripts/et_market_date.py)"
          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "Resolved REPORT_DATE=${REPORT_DATE}"

      - name: Build weekly screening JSON
        shell: bash
        env:
          OUT_DIR: site
          UNIVERSE_CSV: data/universe.csv
          WEEKLY_CANDIDATES_CSV: data/weekly_candidates.csv
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
          WEEKLY_ENABLE_FUNDAMENTALS: ${{ vars.WEEKLY_ENABLE_FUNDAMENTALS || 'false' }}
        run: |
          set -euo pipefail
          python scripts/build_weekly_screening.py

      - name: Render weekly page
        shell: bash
        env:
          OUT_DIR: site
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          python scripts/render_weekly.py

      - name: Verify weekly outputs
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail
          test -f "site/data/weekly/${REPORT_DATE}.json"
          test -f "site/data/weekly/latest.json"
          test -f "site/weekly/index.html"
          test -f "site/assets/weekly.css"
          grep -q "Minervini-style" "site/weekly/index.html"

      - name: Commit changes
        id: commitstep
        shell: bash
        env:
          REPORT_DATE: ${{ steps.set_date.outputs.REPORT_DATE }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add \
            "site/data/weekly/${REPORT_DATE}.json" \
            "site/data/weekly/latest.json" \
            "site/weekly/index.html" \
            "site/assets/weekly.css"

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: publish weekly screening"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commitstep.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
