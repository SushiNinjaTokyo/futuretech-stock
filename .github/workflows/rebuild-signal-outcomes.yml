name: rebuild-signal-outcomes

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Rebuild daily-v2 signals from this date, YYYY-MM-DD"
        required: true
        default: "2026-04-01"
        type: string
      end_date:
        description: "Optional end date, YYYY-MM-DD. Empty = latest"
        required: false
        default: ""
        type: string
      run_mode:
        description: "full rebuilds JSON and renders; render_only renders from existing signals-v2 JSON"
        required: true
        default: "full"
        type: choice
        options: ["full", "render_only"]

permissions:
  contents: write

concurrency:
  group: rebuild-signal-outcomes
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OUT_DIR: site
      DAILY_V2_BACKTEST_SLEEP_SECONDS: "0.6"
      DAILY_V2_RUN_MODE: ${{ github.event.inputs.run_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync latest main
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Rebuild signal outcomes v2
        if: ${{ env.DAILY_V2_RUN_MODE == 'full' }}
        run: |
          set -euo pipefail
          ARGS=(--start-date "${{ github.event.inputs.start_date }}")
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS+=(--end-date "${{ github.event.inputs.end_date }}")
          fi
          python scripts/rebuild_signal_outcomes_v2.py "${ARGS[@]}"
      - name: Render backtest
        run: |
          set -euo pipefail
          test -f site/data/signals-v2/outcomes_latest.json
          python scripts/render_backtest.py
      - name: Commit outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add \
            site/data/signals-v2 \
            site/backtest/index.html \
            site/assets/backtest.css
          if git diff --cached --quiet; then
            echo "No signal v2 changes."
            exit 0
          fi
          git commit -m "chore: rebuild daily signal outcomes v2"
          git pull --rebase origin main
          git push origin main
